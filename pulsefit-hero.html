<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseFit — Train Smarter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    :root {
      --font-body: 'Outfit', sans-serif;
      --font-display: 'Playfair Display', serif;
      --ink: #111118;
      --ink-soft: #4a5568;
      --ink-muted: #718096;
      --surface: #FFFFFF;
      --border: #e2e8f0;
      --accent: #111118;
      --accent-text: #FFFFFF;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      color: var(--ink);
      background: linear-gradient(180deg, #E8F0FF 0%, #F5F9FF 50%, #FFFFFF 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ========== HEADER ========== */
    .header {
      position: relative;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 4vw;
      opacity: 0;
      transform: translateY(-20px);
      animation: fadeDown 0.6s ease forwards;
    }

    .logo {
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--ink);
      letter-spacing: -0.02em;
    }

    .nav {
      display: none;
      gap: 2rem;
      align-items: center;
    }
    @media (min-width: 1024px) {
      .nav { display: flex; }
    }

    .nav-link {
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--ink-soft);
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: opacity 0.2s;
    }
    .nav-link:hover { opacity: 0.6; }

    .nav-link svg {
      width: 14px; height: 14px;
    }

    .header-cta {
      padding: 10px 24px;
      border-radius: 100px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--ink);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .header-cta:hover {
      transform: scale(1.04);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }

    /* ========== HERO ========== */
    .hero {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 1.5rem 2rem;
      gap: 28px;
    }

    .hero-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      line-height: 1.08;
      letter-spacing: -0.02em;
      color: var(--ink);
      max-width: 800px;
      opacity: 0;
      transform: translateY(28px);
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    .hero-title em {
      font-style: italic;
      background: linear-gradient(135deg, #3b60e4, #7b4ae2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 300;
      line-height: 1.65;
      color: var(--ink-soft);
      max-width: 560px;
      opacity: 0;
      transform: translateY(28px);
      animation: fadeUp 0.8s ease 0.35s forwards;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      opacity: 0;
      transform: scale(0.96);
      animation: fadeScale 0.6s ease 0.5s forwards;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 100px;
      background: var(--accent);
      color: var(--accent-text);
      font-family: var(--font-body);
      font-size: 1.05rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.14);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-primary:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 28px rgba(0,0,0,0.2);
    }
    .btn-primary svg { width: 18px; height: 18px; }

    .btn-secondary {
      padding: 14px 32px;
      border-radius: 100px;
      background: transparent;
      border: 1px solid var(--border);
      font-family: var(--font-body);
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--ink);
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
    }
    .btn-secondary:hover {
      transform: scale(1.05);
      border-color: #a0aec0;
    }

    /* Disclaimer */
    .disclaimer {
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--ink-muted);
      font-style: italic;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.65s forwards;
    }

    /* Social Proof */
    .social-proof {
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.6s ease 0.75s forwards;
    }

    .avatar-stack {
      display: flex;
    }

    .avatar-stack img {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2.5px solid #fff;
      object-fit: cover;
      margin-left: -10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .avatar-stack img:first-child { margin-left: 0; }

    .social-proof span {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--ink-soft);
    }

    /* ========== CAROUSEL ========== */
    .carousel-section {
      position: relative;
      z-index: 10;
      width: 100%;
      overflow: hidden;
      padding: 48px 0 56px;
      opacity: 0;
      transform: translateY(60px);
      animation: fadeUp 1s ease 0.9s forwards;
    }

    /* Edge fades */
    .carousel-section::before,
    .carousel-section::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 120px;
      z-index: 5;
      pointer-events: none;
    }
    .carousel-section::before {
      left: 0;
      background: linear-gradient(90deg, #fff 0%, transparent 100%);
    }
    .carousel-section::after {
      right: 0;
      background: linear-gradient(270deg, #fff 0%, transparent 100%);
    }

    .carousel-track {
      display: flex;
      gap: 22px;
      padding-left: 24px;
      animation: scroll var(--scroll-duration, 30s) linear infinite;
      width: max-content;
    }

    @keyframes scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .card {
      flex-shrink: 0;
      width: 320px;
      height: 440px;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(0,0,0,0.1);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }
    .card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 16px 48px rgba(0,0,0,0.18);
    }

    .card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(0,0,0,0.65) 100%);
    }

    .card-text {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-category {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
    }

    .card-title {
      font-family: var(--font-body);
      font-size: 1.3rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
    }

    /* ========== ANIMATIONS ========== */
    @keyframes fadeDown {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeScale {
      to { opacity: 1; transform: scale(1); }
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 640px) {
      .hero { padding: 2.5rem 1.25rem 1.5rem; }
      .btn-row { flex-direction: column; width: 100%; }
      .btn-primary, .btn-secondary { width: 100%; justify-content: center; }
      .card { width: 280px; height: 380px; }
      .header-cta { display: none; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">PulseFit</div>
    <nav class="nav" aria-label="Main navigation">
      <button class="nav-link">Features</button>
      <button class="nav-link">
        Programs
        <svg viewBox="0 0 16 16" fill="none"><path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="nav-link">Testimonials</button>
      <button class="nav-link">Pricing</button>
      <button class="nav-link">Contact</button>
    </nav>
    <button class="header-cta">Get Free Trial</button>
  </header>

  <!-- Hero -->
  <main class="hero">
    <h1 class="hero-title">Train smarter.<br/><em>Anywhere. Anytime.</em></h1>
    <p class="hero-subtitle">
      Guided fitness sessions tailored to your goals — whether it's strength, endurance, or flexibility. Streamlined, motivating, and accessible 24/7.
    </p>

    <div class="btn-row">
      <button class="btn-primary">
        Start training
        <svg viewBox="0 0 20 20" fill="none"><path d="M7 10H13M13 10L10 7M13 10L10 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="btn-secondary">Browse programs</button>
    </div>

    <p class="disclaimer">*No credit card required</p>

    <div class="social-proof">
      <div class="avatar-stack">
        <img src="https://i.pravatar.cc/150?img=1" alt="User 1" />
        <img src="https://i.pravatar.cc/150?img=2" alt="User 2" />
        <img src="https://i.pravatar.cc/150?img=3" alt="User 3" />
        <img src="https://i.pravatar.cc/150?img=4" alt="User 4" />
      </div>
      <span>Join over 10,000+ people</span>
    </div>
  </main>

  <!-- Carousel -->
  <section class="carousel-section" aria-label="Programs carousel">
    <div class="carousel-track" id="carouselTrack">
      <!-- Cards injected by JS -->
    </div>
  </section>

  <script>
    const programs = [
      {
        image: "https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=400&h=500&fit=crop",
        category: "BEGINNER",
        title: "Jumping challenge"
      },
      {
        image: "https://images.unsplash.com/photo-1518611012118-696072aa579a?w=400&h=500&fit=crop",
        category: "INTERMEDIATE",
        title: "Core stability flow"
      },
      {
        image: "https://images.unsplash.com/photo-1476480862126-209bfaa8edc8?w=400&h=500&fit=crop",
        category: "ADVANCED",
        title: "Trail sprint challenge"
      },
      {
        image: "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=400&h=500&fit=crop",
        category: "ALL LEVELS",
        title: "Full-body bootcamp"
      },
      {
        image: "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=400&h=500&fit=crop",
        category: "RECOVERY",
        title: "Mobility & Recovery"
      }
    ];

    function buildCards() {
      const track = document.getElementById('carouselTrack');
      // Duplicate for seamless looping
      const allPrograms = [...programs, ...programs];
      track.innerHTML = allPrograms.map(p => `
        <div class="card">
          <img src="${p.image}" alt="${p.title}" loading="lazy" />
          <div class="card-overlay"></div>
          <div class="card-text">
            <span class="card-category">${p.category}</span>
            <h3 class="card-title">${p.title}</h3>
          </div>
        </div>
      `).join('');

      // Set scroll duration based on card count
      const duration = programs.length * 4;
      track.style.setProperty('--scroll-duration', duration + 's');
    }

    buildCards();
  </script>

</body>
</html>
