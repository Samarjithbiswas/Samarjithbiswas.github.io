<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Robot</title>
    <style>
        /* ── Fully transparent, no UI, no borders, no text ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        /* ── Spline viewer fills the entire viewport ── */
        spline-viewer {
            display: block;
            width: 100%;
            height: 100%;
            pointer-events: auto;
            background: transparent;
        }

        /* ── Hide the Spline logo / watermark completely ── */
        spline-viewer::part(logo) {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
            height: 0 !important;
            width: 0 !important;
        }

        spline-viewer>canvas+div,
        spline-viewer>canvas~div,
        spline-viewer #logo,
        spline-viewer a[href*="spline"],
        spline-viewer div[style*="bottom"],
        spline-viewer div:not(:empty):last-child:not(canvas) {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            height: 0 !important;
            width: 0 !important;
            overflow: hidden !important;
            pointer-events: none !important;
            position: absolute !important;
            z-index: -1 !important;
        }
    </style>
</head>

<body>

    <!-- The interactive 3D Spline robot from the cover — fully interactive with gestures -->
    <spline-viewer url="https://prod.spline.design/kZDDjO5HuC9GJUM2/scene.splinecode" loading-anim-type="none"
        hint="false" background="transparent">
    </spline-viewer>

    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.96/build/spline-viewer.js"></script>

    <script>
        // Remove "Made with Spline" watermark after load
        function removeSplineLogo() {
            const viewer = document.querySelector('spline-viewer');
            if (!viewer || !viewer.shadowRoot) return;
            const logo = viewer.shadowRoot.querySelector('#logo') ||
                         viewer.shadowRoot.querySelector('a[href*="spline"]') ||
                         viewer.shadowRoot.querySelector('div:last-child:not(canvas)');
            if (logo) {
                logo.style.display = 'none';
                logo.style.visibility = 'hidden';
                logo.style.opacity = '0';
                logo.style.height = '0';
                logo.style.width = '0';
                logo.style.overflow = 'hidden';
                logo.style.pointerEvents = 'none';
            }
            // Also try to hide all non-canvas children in shadow DOM
            const allDivs = viewer.shadowRoot.querySelectorAll('div');
            allDivs.forEach(d => {
                if (d.querySelector('a') || d.textContent.toLowerCase().includes('spline')) {
                    d.style.display = 'none';
                    d.style.visibility = 'hidden';
                    d.style.opacity = '0';
                    d.style.height = '0';
                    d.style.pointerEvents = 'none';
                }
            });
        }
        // Try multiple times as Spline loads asynchronously
        setTimeout(removeSplineLogo, 2000);
        setTimeout(removeSplineLogo, 4000);
        setTimeout(removeSplineLogo, 6000);
        setTimeout(removeSplineLogo, 10000);
    </script>
</body>

</html>
